# LiteLLM Proxy 最小配置 — TCM Knowledge Engine
# 复制此文件为 config.yaml，填入真实 API Key 后启动。
# config.yaml 已在 .gitignore 中，不会提交到仓库。

model_list:
  - model_name: claude-sonnet          # App 中 Model Name 填此值
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 1800

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
